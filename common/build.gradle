plugins {
    id 'org.spongepowered.gradle.vanilla' version '0.2.1-SNAPSHOT'
}
base.archivesName.set("${mod_name}-common")

minecraft {
    version(minecraft_version)
}

sourceSets.main.resources.srcDir 'src/generated/resources'

dependencies {
    // Common-only compile-time deps used by shared utilities
    compileOnly "curse.maven:serene-seasons-291874:6747297"
    compileOnly "curse.maven:glitchcore-955399:6398449"
    compileOnly "curse.maven:betterdays-895618:6407892"
    compileOnly group:'org.spongepowered', name: 'mixin', version: '0.8.5'
    compileOnly "com.illusivesoulworks.spectrelib:spectrelib-common:0.17.2+1.21"
}
