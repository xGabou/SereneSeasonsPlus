plugins {
    id 'org.spongepowered.gradle.vanilla' version '0.2.1-SNAPSHOT'
}
base.archivesName.set("${mod_name}-common")

minecraft {
    version(minecraft_version)
}

sourceSets.main.resources.srcDir 'src/generated/resources'

dependencies {
    // Common-only compile-time deps used by shared utilities
    compileOnly "curse.maven:serene-seasons-291874:6398227"
    compileOnly "curse.maven:glitchcore-955399:5787839"      // BetterDays / GlitchCore
    compileOnly group: 'technology.roughness.whitenoise', name: "whitenoise-${minecraft_version}-common", version: "${whitenoise_version}"
    compileOnly "curse.maven:betterdays-895618:5877548"

    compileOnly group:'org.spongepowered', name: 'mixin', version: '0.8.5'
    compileOnly "curse.maven:gabous-libs-1367332:7163326"
}
