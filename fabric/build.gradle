def fabricUploadJar = tasks.named("remapJar").flatMap { it.archiveFile }

modrinth {
    token = System.getenv("MODRINTH_TOKEN")
    projectId = "4Al4H3t9"
    versionNumber = "Fabric-${project.version}"
    versionName = "Serene Seasons Plus ${mod_version}"
    changelog = rootProject.file("SSPchangelog.md").text
    gameVersions = ["1.21.11"]
    loaders = ["fabric"]
    versionType = "beta"
    dependencies {
        required.project "e0bNACJD"
        required.project "tPLE214j"
        required.project "mOgUt4GM"
    }
    uploadFile = fabricUploadJar
}

tasks.register("curseforgeUploadFabric", net.darkhax.curseforgegradle.TaskPublishCurseForge) {
    apiToken = System.getenv("CURSEFORGE_TOKEN")

    def mainFile = upload(1288843, fabricUploadJar.get().asFile)
    mainFile.releaseType = "beta"
    mainFile.addGameVersion("1.21.11")
    mainFile.addModLoader("Fabric")
    mainFile.changelog = rootProject.file("SSPchangelog.md").text
    mainFile.displayName = "Fabric-${project.version}"
}

