plugins {
    id 'fabric-loom' version '1.11-SNAPSHOT'
    id "com.matthewprenger.cursegradle" version "1.4.0"
}
base.archivesName.set("${mod_name}-fabric")

loom {
    // Sépare les sources client et serveur
    splitEnvironmentSourceSets()
    mixin {
        defaultRefmapName.set("${mod_id}.refmap.json")
    }
    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }
    runs {
        client {
            client()
            setConfigName("Fabric Client")
            ideConfigGenerated(true)
            runDir("run")
            vmArg "-Ddevauth.enabled=true"
            vmArg "-Ddevauth.account=main"
            vmArg "-Dlog4j2.level=DEBUG"
        }
        server {
            server()
            setConfigName("Fabric Server")
            ideConfigGenerated(true)
            runDir("run")
            vmArg "-Dlog4j2.level=DEBUG"
        }
    }
}

// Inclut les ressources du common
processResources {
    from project(":Common").sourceSets.main.resources
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"

    implementation project(":Common")

    // tes dépendances Fabric spécifiques
    modImplementation "curse.maven:betterdays-895618:5477587"
    modImplementation "curse.maven:serene-seasons-291874:5420643"
    modImplementation "curse.maven:glitchcore-955399:5352265"
    modImplementation "curse.maven:modmenu-308702:5441532"
    modImplementation "com.illusivesoulworks.spectrelib:spectrelib-fabric:0.16.1+1.20.6"
    include implementation("com.electronwill.night-config:toml:${nightconfig_version}")
    include implementation("com.electronwill.night-config:core:${nightconfig_version}")
    include implementation("net.jodah:typetools:0.6.3")
    runtimeOnly("me.djtheredstoner:DevAuth-fabric:1.2.1")
    modImplementation "curse.maven:spark-361579:4950610"
    //modImplementation "curse.maven:sodium-394468:5092261"
}
